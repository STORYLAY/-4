<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>言复助手 - Yanfu Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', 'Noto Sans SC', sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      /* Custom scrollbar for Webkit */
      .custom-scrollbar::-webkit-scrollbar,
      .custom-scrollbar-short::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      .custom-scrollbar::-webkit-scrollbar-track,
      .custom-scrollbar-short::-webkit-scrollbar-track {
        background: transparent;
      }
      .custom-scrollbar-short::-webkit-scrollbar-track {
        background: transparent;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb,
      .custom-scrollbar-short::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 3px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover,
      .custom-scrollbar-short::-webkit-scrollbar-thumb:hover {
        background: #94a3b8;
      }

      /* Markdown Content Styles */
      .markdown-body {
        font-size: 0.95rem;
        line-height: 1.75;
        color: #374151;
      }
      .markdown-body p {
        margin-bottom: 0.75em;
      }
      .markdown-body p:last-child {
        margin-bottom: 0;
      }
      .markdown-body h1, .markdown-body h2, .markdown-body h3 {
        font-weight: 700;
        margin-top: 1.5em;
        margin-bottom: 0.5em;
        line-height: 1.3;
        color: #111827;
      }
      .markdown-body h1 { font-size: 1.5em; }
      .markdown-body h2 { font-size: 1.25em; }
      .markdown-body h3 { font-size: 1.1em; }
      
      .markdown-body ul {
        list-style-type: disc;
        padding-left: 1.5em;
        margin-bottom: 0.75em;
      }
      .markdown-body ol {
        list-style-type: decimal;
        padding-left: 1.5em;
        margin-bottom: 0.75em;
      }
      .markdown-body li {
        margin-bottom: 0.25em;
      }
      
      /* Mac-style Code Block Container */
      .markdown-body pre {
        background-color: #1e293b; /* Slate 800 */
        color: #e2e8f0;
        padding: 1rem;
        padding-top: 2.5rem; /* Space for the "window controls" */
        border-radius: 0.75rem;
        overflow-x: auto;
        margin-bottom: 1em;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        font-size: 0.85em;
        border: 1px solid #334155;
        position: relative;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      }
      
      /* The "Traffic Lights" (Red, Yellow, Green dots) */
      .markdown-body pre::before {
        content: "";
        position: absolute;
        top: 0.8rem;
        left: 1rem;
        width: 0.65rem;
        height: 0.65rem;
        border-radius: 50%;
        background: #ff5f56; /* Red */
        box-shadow: 1.2rem 0 0 #ffbd2e, 2.4rem 0 0 #27c93f; /* Yellow & Green shadows */
      }
      
      .markdown-body code {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        font-size: 0.85em;
        background-color: #f1f5f9;
        padding: 0.2em 0.4em;
        border-radius: 0.375rem;
        color: #0f172a;
        font-weight: 500;
      }
      
      .markdown-body pre code {
        background-color: transparent;
        padding: 0;
        color: inherit;
        border-radius: 0;
        font-weight: 400;
      }
      
      .markdown-body blockquote {
        border-left: 4px solid #3b82f6;
        padding-left: 1em;
        color: #4b5563;
        font-style: italic;
        margin-bottom: 1em;
        background-color: #f8fafc;
        padding: 0.75rem 1rem;
        border-radius: 0 0.5rem 0.5rem 0;
      }

      .markdown-body a {
        color: #2563eb;
        text-decoration: none;
        border-bottom: 1px solid transparent;
        font-weight: 500;
      }
      .markdown-body a:hover {
        border-bottom-color: #2563eb;
      }

      .markdown-body table {
        width: 100%;
        border-collapse: separate;
        border-spacing: 0;
        margin-bottom: 1em;
        font-size: 0.9em;
        border-radius: 0.5rem;
        overflow: hidden;
        border: 1px solid #e2e8f0;
      }
      .markdown-body th, .markdown-body td {
        border-bottom: 1px solid #e2e8f0;
        border-right: 1px solid #e2e8f0;
        padding: 0.75rem 1rem;
        text-align: left;
      }
      .markdown-body th:last-child, .markdown-body td:last-child {
        border-right: none;
      }
      .markdown-body tr:last-child td {
        border-bottom: none;
      }
      .markdown-body th {
        background-color: #f8fafc;
        font-weight: 600;
        color: #475569;
      }

      /* Blinking Cursor Animation */
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
      .cursor-blink {
        display: inline-block;
        width: 6px;
        height: 18px;
        background-color: #3b82f6;
        margin-left: 2px;
        vertical-align: text-bottom;
        animation: blink 1s step-end infinite;
        border-radius: 2px;
      }

      @keyframes bounce-in {
        0% { transform: translate(-50%, 20px) scale(0.8); opacity: 0; }
        100% { transform: translate(-50%, 0) scale(1); opacity: 1; }
      }
      .animate-bounce-in {
        animation: bounce-in 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "@google/genai": "https://esm.sh/@google/genai@^1.39.0",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "react-markdown": "https://esm.sh/react-markdown@9.0.1?bundle",
    "remark-gfm": "https://esm.sh/remark-gfm@4.0.0?bundle"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>

    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
